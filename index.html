<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>철거덕 - 상가 사무실 철거 원상복구 플랫폼</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <header>
        <div class="logo">철거덕</div>
        <nav>
            <ul>
                <li><a href="#calculator">폐업지원금 계산기</a></li>
                <li><a href="#procedure">진행절차</a></li>
                <li><a href="#reviews">고객후기</a></li>
                <li><a href="#hope-package">희망리턴패키지</a></li>
                <li><a href="#partnership">제휴문의</a></li>
                <li><a href="#" id="open-quote-modal-nav">견적문의</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>한 번 맡기면 걱정 끝.<br>철거덕에서 철거 비교 견적을 받아 보세요.</h1>
                <h2>가장 쉽고 빠른 철거, <span class="blue-text">철거덕</span></h2>
                <div class="cta-buttons">
                    <button id="open-simple-inquiry">간편문의</button>
                    <button id="open-quote-modal">지금 바로 무료 견적 받기</button>
                </div>
            </div>
        </section>

        <section id="procedure" class="content-section">
            <h2>진행 절차</h2>
            <p>철거덕의 간편하고 빠른 철거 진행 절차를 소개합니다.</p>
            <!-- Add more content here -->
        </section>

        <section id="reviews" class="content-section">
            <h2>고객 후기</h2>
            <p>철거덕을 이용하신 고객님들의 생생한 후기를 확인하세요.</p>
            <!-- Add more content here -->
        </section>

        <section id="hope-package" class="content-section">
            <h2>희망리턴패키지</h2>
            <p>소상공인을 위한 희망리턴패키지 정보를 안내합니다.</p>
            <!-- Add more content here -->
        </section>

        <section id="partnership" class="content-section">
            <h2>제휴 문의</h2>
            <p style="text-align: center; margin-bottom: 2rem;">철거덕과 함께 성장할 파트너사를 모십니다.</p>
            <div class="partnership-form-container">
                <form action="https://formspree.io/f/xdaygkqz" method="POST">
                    <div class="form-group">
                        <label for="partner-name">업체명 / 성함</label>
                        <input type="text" id="partner-name" name="name" placeholder="업체명 또는 성함을 입력해주세요" required>
                    </div>
                    <div class="form-group">
                        <label for="partner-email">이메일 주소</label>
                        <input type="email" id="partner-email" name="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="partner-phone">연락처</label>
                        <input type="tel" id="partner-phone" name="phone" placeholder="010-0000-0000" required>
                    </div>
                    <div class="form-group">
                        <label for="partner-message">문의 내용</label>
                        <textarea id="partner-message" name="message" rows="5" placeholder="제휴 관련 문의 내용을 상세히 적어주세요" required></textarea>
                    </div>
                    <button type="submit" class="partnership-submit-button">제휴 문의하기</button>
                </form>
            </div>
        </section>
    </main>

    <simple-inquiry-modal></simple-inquiry-modal>
    <quote-request-modal></quote-request-modal>

</body>
</html>
